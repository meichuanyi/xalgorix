# Dodo Payments product IDs for the us-east-1 region.
#
# Loaded at boot by internal/cloud/billing.LoadPlans (task 4.3 of the
# xalgorix-saas spec). The keys mirror the Plan / Period enums declared
# in internal/cloud/billing/plans.go and the plan list in
# requirements.md → "Pricing and Plans".
#
# The Free plan is intentionally absent: Free has no Dodo product because
# it has no monthly bill. Resolve PlanFree in code, not here.
#
# Real product IDs come from the Dodo Payments dashboard (test mode and
# live mode use different IDs). The placeholders below are valid for
# development against the local Dodo emulator; production overlays in
# AWS Secrets Manager replace this file at deploy time.
pro:
  monthly: prod_pro_monthly_us_east_1_placeholder
  annual:  prod_pro_annual_us_east_1_placeholder
team:
  monthly: prod_team_monthly_us_east_1_placeholder
  annual:  prod_team_annual_us_east_1_placeholder
enterprise:
  monthly: prod_enterprise_monthly_us_east_1_placeholder
  annual:  prod_enterprise_annual_us_east_1_placeholder
