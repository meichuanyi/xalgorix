---
# ClusterSecretStore: aws-secrets-manager
#
# Single cluster-wide source of truth that every ExternalSecret in this
# directory references. Kept cluster-scoped (rather than namespace-scoped)
# because the same secrets are consumed by API_Server pods and Worker_Pool
# pods that may live in dedicated per-Org namespaces (Enterprise tier).
#
# IRSA is the only supported auth mode: the operator's ServiceAccount
# (external-secrets/external-secrets) is bound to an IAM role that has
# `secretsmanager:GetSecretValue` and `kms:Decrypt` on the
# `xalgorix/*` secret ARNs and the KMS CMKs that protect them.
#
# The region is templated at deploy time by Kustomize / Helm so the same
# manifest can be rendered into us-east-1 and eu-west-1 overlays.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: xalgorix
    app.kubernetes.io/component: secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      # Region is rendered per-cluster overlay; do NOT hardcode.
      region: ${AWS_REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
