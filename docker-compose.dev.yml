# Local development stack for the Xalgorix SaaS Cloud_Platform.
#
# Spins up the data-plane dependencies referenced by `design.md`:
#   * PostgreSQL 16  — primary store (RLS-keyed multi-tenant data)
#   * Redis 7        — sessions, rate limiting, pub/sub for live telemetry
#   * NATS JetStream — durable scan job queue (scans.dispatch / events / results)
#   * MinIO          — S3-compatible object storage (reports, logos, evidence)
#   * ClamAV         — virus scanning sidecar for uploads
#   * Mailpit        — local SMTP capture for transactional email (Resend stand-in)
#
# Use `make dev-up` to start and `make dev-down` to stop. State is persisted in
# named volumes so the stack survives restarts; remove volumes with
# `docker compose -f docker-compose.dev.yml down -v` for a clean slate.

name: xalgorix-dev

networks:
  xalgorix-dev:
    driver: bridge

volumes:
  postgres-data: {}
  redis-data: {}
  nats-data: {}
  minio-data: {}
  clamav-data: {}

services:
  postgres:
    image: postgres:16-alpine
    container_name: xalgorix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xalgorix
      POSTGRES_PASSWORD: xalgorix
      POSTGRES_DB: xalgorix
      # Required by goose migrations and by the citext columns in the schema.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xalgorix -d xalgorix"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [xalgorix-dev]

  redis:
    image: redis:7-alpine
    container_name: xalgorix-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory-policy", "allkeys-lru",
      ]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xalgorix-dev]

  nats:
    image: nats:2-alpine
    container_name: xalgorix-nats
    restart: unless-stopped
    command:
      [
        "-js",
        "-sd", "/data",
        "-m", "8222",
      ]
    ports:
      - "127.0.0.1:4222:4222"   # client protocol
      - "127.0.0.1:8222:8222"   # http monitoring
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xalgorix-dev]

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: xalgorix-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: xalgorix
      MINIO_ROOT_PASSWORD: xalgorix-dev-secret
      MINIO_REGION: us-east-1
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xalgorix-dev]

  # Pre-creates the default bucket on first boot so the API_Server / Worker_Pool
  # can `Put` artifacts under `org/{org}/workspace/{ws}/scan/{id}/` immediately.
  minio-bootstrap:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: xalgorix-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 xalgorix xalgorix-dev-secret
        mc mb --ignore-existing local/xalgorix-dev
        mc anonymous set none local/xalgorix-dev
        echo "minio bootstrap complete"
    networks: [xalgorix-dev]
    restart: "no"

  clamav:
    image: clamav/clamav:1.3
    container_name: xalgorix-clamav
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks: [xalgorix-dev]

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: xalgorix-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [xalgorix-dev]
