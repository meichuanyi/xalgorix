# golangci-lint configuration for xalgorix.
#
# Implements task 0.3 of the xalgorix-saas spec (Requirement 20.11):
# baseline static analysis for the Go module. Runs in CI on every PR
# via .github/workflows/ci.yml and locally via `make lint`.
#
# Schema reference: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.24"

  # The repo currently has both the legacy self-hosted binary
  # (cmd/xalgorix, internal/web, internal/...) and the upcoming
  # cloud SaaS surface (cmd/xalgorix-cloud, internal/cloud).
  # Keep generated assets and the embedded webui out of scope.
  skip-dirs:
    - webui/node_modules
    - webui/dist
    - webui/build
    - internal/web/static
    - build
    - assets/webui

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    # Compile-time correctness
    - govet
    - staticcheck
    - typecheck
    - errcheck
    - ineffassign
    - unused

    # Style and consistency
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - whitespace

    # Bug-prone patterns
    - bodyclose
    - errorlint
    - nilerr
    - rowserrcheck
    - sqlclosecheck

    # Light-weight security passes
    # (gosec runs separately via `make sec`; this one catches obvious leaks)
    - gosec

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment # noisy on UI/log structs; revisit per-package later

  staticcheck:
    checks:
      - all

  errcheck:
    check-type-assertions: true
    check-blank: false

  gosec:
    # gosec.json is the authoritative config for the dedicated `make sec` run.
    # Here we keep the in-lint pass cheap and exclude rules that are better
    # gated by the dedicated security workflow.
    excludes:
      - G104 # audited error returns are checked by errcheck
      - G304 # file path joins are reviewed in storage/* package directly
      - G404 # weak RNG: scanner uses math/rand for non-crypto paths

  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "disableStutteringCheck"
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: var-declaration

  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

  exclude-rules:
    # Tests can be a little noisier; keep style strict but loosen security.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - bodyclose

    # Generated code is exempt from style checks.
    - path: \.pb\.go$
      linters:
        - all
    - path: _gen\.go$
      linters:
        - all

    # Allow TODO comments without nagging until the SaaS phases are filled in.
    - linters:
        - revive
      text: "should have comment"
